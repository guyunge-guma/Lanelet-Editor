<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lanelet Editor</title>

    <!-- Potree CSS -->
    <link rel="stylesheet" href="/potree/potree.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Potree 1.8 依赖(顺序很重要) -->
    <!-- 1. jQuery(Potree UI 依赖) -->
    <script src="/libs/jquery/jquery-3.1.1.min.js"></script>
    <!-- 2. proj4(地理坐标投影) -->
    <script src="/libs/proj4/proj4.js"></script>
    <!-- 3. BinaryHeap(可见性计算用) -->
    <script src="/libs/other/BinaryHeap.js"></script>
    <!-- 4. TWEEN(相机动画用) -->
    <script src="/libs/tween/tween.min.js"></script>
    <!-- 5. three.js r124 (与 Potree 1.8 内部版本一致)
         Potree 1.8.x 的 potree.js webpack 打包了 three.js 但不暴露到 window,
         需单独加载。先尝试 CDN,失败则尝试本地 Potree libs 目录 -->
    <script>
      // 动态加载 three.js,优先 CDN,失败则尝试本地路径
      (function() {
        var paths = [
          'https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js',
          '/libs/three.js/build/three.min.js',
          '/libs/three.js/three.min.js',
          '/potree/libs/three.js/build/three.min.js',
        ];
        var idx = 0;
        function tryLoad() {
          if (idx >= paths.length) {
            console.error('[Lanelet Editor] 所有 three.js 加载路径均失败');
            return;
          }
          var s = document.createElement('script');
          s.src = paths[idx];
          s.onload = function() {
            console.log('[Lanelet Editor] three.js 加载成功:', paths[idx]);
          };
          s.onerror = function() {
            console.warn('[Lanelet Editor] three.js 加载失败:', paths[idx]);
            idx++;
            tryLoad();
          };
          document.head.appendChild(s);
        }
        tryLoad();
      })();
    </script>

    <!-- Potree 主库(从 GitHub Release 1.8.2 预构建) -->
    <script src="/potree/potree.js"></script>

    <!-- Vue 应用入口 -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
