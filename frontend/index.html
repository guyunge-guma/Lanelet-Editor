<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lanelet Editor</title>

    <!-- Potree CSS -->
    <link rel="stylesheet" href="/potree/potree.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Potree 1.8 依赖(顺序很重要) -->
    <!-- 1. jQuery(Potree UI 依赖) -->
    <script src="/libs/jquery/jquery-3.1.1.min.js"></script>
    <!-- 2. proj4(地理坐标投影) -->
    <script src="/libs/proj4/proj4.js"></script>
    <!-- 3. BinaryHeap(可见性计算用) -->
    <script src="/libs/other/BinaryHeap.js"></script>
    <!-- 4. TWEEN(相机动画用) -->
    <script src="/libs/tween/tween.min.js"></script>
    <!-- three.js 不需要单独加载,Potree 自带 three.module.js -->

    <!-- Potree 主库(从 GitHub Release 1.8.2 预构建) -->
    <script src="/potree/potree.js"></script>

    <!-- Vue 应用入口 -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
